<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G.E.M.I.N.I. Nexus Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00f3ff;   
            --secondary: #bc13fe; 
            --alert: #ff003c;     
            --bg-dark: #050505;
            --glass: rgba(0, 243, 255, 0.05);
            --border: rgba(0, 243, 255, 0.3);
            --font-main: 'Orbitron', sans-serif;
            --font-code: 'Share Tech Mono', monospace;
            --gemini-bar-bg: #1e1e1e; /* Gemini 輸入框底色 */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; scrollbar-width: none; }
        ::-webkit-scrollbar { display: none; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--primary);
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
            perspective: 1500px;
        }

        /* 背景層 */
        #canvas-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.6; }
        .scanlines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2)); background-size: 100% 4px; z-index: 100; pointer-events: none; opacity: 0.3; }
        .vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 50%, black 100%); z-index: 99; pointer-events: none; }

        /* UI Grid 配置 */
        .ui-grid {
            position: relative;
            z-index: 10;
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            grid-template-rows: 80px 1fr 100px; /* 底部高度預留 */
            height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        /* 頂部欄 */
        .top-bar {
            grid-column: 1 / 4;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(90deg, transparent, var(--glass), transparent);
            padding: 0 40px; position: relative;
        }
        .top-bar::before, .top-bar::after { content: ''; position: absolute; bottom: -5px; width: 10px; height: 10px; background: var(--primary); box-shadow: 0 0 10px var(--primary); }
        .top-bar::before { left: 20%; } .top-bar::after { right: 20%; }
        .logo-area h1 { font-size: 2rem; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 10px var(--primary); }
        .system-clock { font-family: var(--font-code); font-size: 1.2rem; color: #fff; }

        /* 左右側邊欄 */
        .left-sidebar { display: flex; flex-direction: column; gap: 20px; border-right: 1px solid var(--border); padding-right: 20px; }
        .right-sidebar { display: flex; flex-direction: column; gap: 20px; border-left: 1px solid var(--border); padding-left: 20px; }
        .panel { background: rgba(0, 0, 0, 0.6); border: 1px solid var(--border); padding: 15px; position: relative; overflow: hidden; }
        .panel::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--primary); animation: scan 3s linear infinite; }
        @keyframes scan { 0% {top:0;} 100% {top:100%;} }
        .panel h3 { font-size: 0.8rem; color: var(--secondary); margin-bottom: 10px; text-transform: uppercase; }
        .console-log { font-family: var(--font-code); font-size: 0.7rem; color: #0f0; height: 200px; overflow: hidden; opacity: 0.8; line-height: 1.4; }
        .chart-box { height: 150px; border: 1px solid #333; background: rgba(0,0,0,0.5); display: flex; align-items: flex-end; justify-content: space-between; padding: 5px; }
        .bar { width: 15%; background: var(--primary); transition: height 0.2s; box-shadow: 0 0 10px var(--primary); }

        /* 中央 3D 舞台 */
        .center-stage { display: flex; justify-content: center; align-items: center; gap: 50px; perspective: 2000px; }
        .portal-card { width: 320px; height: 500px; position: relative; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; }
        .portal-card:hover { transform: rotateY(0deg) scale(1.05) translateZ(50px); z-index: 100; }
        .card-inner { position: absolute; width: 100%; height: 100%; background: rgba(10, 10, 20, 0.8); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 0 30px rgba(0, 243, 255, 0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .card-layer { transform: translateZ(30px); text-align: center; }
        .card-icon { font-size: 80px; margin-bottom: 30px; filter: drop-shadow(0 0 15px var(--primary)); transition: 0.3s; }
        .portal-card:hover .card-icon { transform: scale(1.2) translateZ(50px); color: #fff; }
        .card-title { font-size: 2rem; font-weight: 900; letter-spacing: 3px; margin-bottom: 10px; }
        .card-status { font-family: var(--font-code); font-size: 0.9rem; color: var(--secondary); }
        .portal-card::after { content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px; background: linear-gradient(45deg, var(--primary), transparent, var(--secondary)); z-index: -1; border-radius: 15px; opacity: 0.5; transition: 0.3s; }
        .portal-card:hover::after { opacity: 1; box-shadow: 0 0 50px var(--primary); }

        /* =========================================
           GEMINI STYLE INPUT BAR (新功能)
           ========================================= */
        .gemini-bar-container {
            grid-column: 1 / 4;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .gemini-input {
            width: 700px;
            max-width: 90%;
            height: 60px;
            background: var(--gemini-bar-bg);
            border-radius: 30px; /* 膠囊形狀 */
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            padding: 0 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1000;
            transition: 0.3s;
        }

        .gemini-input:hover {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }

        .gemini-icon-sparkle {
            font-size: 1.5rem;
            margin-right: 15px;
            background: linear-gradient(135deg, #4285f4, #9b72cb, #d96570);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.7; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.05); } 100% { opacity: 0.7; transform: scale(0.95); } }

        /* 打字機文字樣式 */
        #typewriter-text {
            font-family: var(--font-code);
            font-size: 1.1rem;
            color: #e3e3e3;
            flex: 1; /* 佔滿剩餘空間 */
            white-space: nowrap;
            overflow: hidden;
        }

        .cursor {
            display: inline-block;
            width: 8px; height: 1.2rem;
            background-color: var(--primary);
            margin-left: 5px;
            animation: blink 0.8s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .mic-icon {
            color: #888;
            font-size: 1.2rem;
            margin-left: 15px;
            cursor: pointer;
            transition: 0.2s;
        }
        .mic-icon:hover { color: #fff; }

        /* =========================================
           LOADING SCREEN
           ========================================= */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--primary); }
        .loader-text { font-family: var(--font-code); margin-top: 20px; animation: blink 0.5s infinite; }
        .progress-bar { width: 300px; height: 4px; background: #333; margin-top: 10px; position: relative; }
        .progress-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--primary); width: 0%; transition: width 0.1s; box-shadow: 0 0 10px var(--primary); }

        /* GLITCH TEXT */
        .glitch-wrapper { position: relative; }
    </style>
</head>
<body>

    <div id="loader">
        <h1 style="font-size: 3rem;">SYSTEM BOOT</h1>
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        <div class="loader-text" id="loader-log">INITIALIZING...</div>
    </div>

    <canvas id="canvas-layer"></canvas>
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <div class="ui-grid">
        
        <div class="top-bar">
            <div class="logo-area">
                <h1 class="glitch-text" data-text="GEMINI NEXUS">AI Future</h1>
            </div>
            <div class="system-status">
                <span style="color:var(--primary);">CPU: <span id="cpu-val">12</span>%</span>
                <span style="margin: 0 20px; color:var(--secondary);">MEM: <span id="mem-val">40</span>%</span>
            </div>
            <div class="system-clock" id="clock">00:00:00</div>
        </div>

        <div class="left-sidebar">
            <div class="panel">
                <h3><i class="fas fa-terminal"></i> System Log</h3>
                <div class="console-log" id="console">
                    > Connecting to satellite...<br>
                    > Decrypting keys...<br>
                </div>
            </div>
            <div class="panel" style="flex:1;">
                <h3><i class="fas fa-network-wired"></i> Neural Net</h3>
                <div style="width:100%; height:100%; background: radial-gradient(circle, var(--primary) 2px, transparent 3px); background-size: 20px 20px; opacity:0.3;"></div>
            </div>
        </div>

        <div class="center-stage">
            
            <div class="portal-card" onclick="window.location.href='dashboard.html'">
                <div class="card-inner">
                    <div class="card-layer">
                        <div class="card-icon" style="color:#ff00cc;"><i class="fas fa-hdd"></i></div>
                        <div class="card-title">DRAM TRACKER</div>
                        <div class="card-status">STATUS: MONITORING</div>
                        <p style="margin-top:20px; color:#aaa; font-family:var(--font-code);">Target: Momo / T-FORCE</p>
                    </div>
                </div>
            </div>

            <div class="portal-card" onclick="window.location.href='dashboard1.html'">
                <div class="card-inner">
                    <div class="card-layer">
                        <div class="card-icon" style="color:#00f3ff;"><i class="fas fa-microchip"></i></div>
                        <div class="card-title">SSD TRACKER</div>
                        <div class="card-status">STATUS: ACTIVE</div>
                        <p style="margin-top:20px; color:#aaa; font-family:var(--font-code);">Target: Momo / Kingston</p>
                    </div>
                </div>
            </div>

        </div>

        <div class="right-sidebar">
            <div class="panel">
                <h3><i class="fas fa-chart-bar"></i> Analysis</h3>
                <div class="chart-box" id="audio-visualizer">
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                </div>
            </div>
            <div class="panel" style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;">
                <h3><i class="fas fa-shield-alt"></i> Security</h3>
                <div style="font-size:4rem; color:var(--alert); text-shadow:0 0 20px var(--alert);"><i class="fas fa-lock"></i></div>
            </div>
        </div>

        <div class="gemini-bar-container">
            <div class="gemini-input">
                <i class="fas fa-sparkles gemini-icon-sparkle"></i>
                <span id="typewriter-text"></span><span class="cursor"></span>
                <i class="fas fa-microphone mic-icon"></i>
            </div>
        </div>

    </div>

    <script>
        // JS MODULE 1: PARTICLES
        const canvas = document.getElementById('canvas-layer');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 1.5; this.vy = (Math.random() - 0.5) * 1.5;
                this.size = Math.random() * 2; this.color = Math.random() > 0.5 ? '#00f3ff' : '#bc13fe';
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill(); }
        }

        function initParticles() { particles = []; for (let i = 0; i < 150; i++) particles.push(new Particle()); }
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(); particles[i].draw();
                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x; const dy = particles[i].y - particles[j].y; const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 100) { ctx.beginPath(); ctx.strokeStyle = `rgba(0, 243, 255, ${1 - dist / 100})`; ctx.lineWidth = 0.5; ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke(); }
                }
            }
            requestAnimationFrame(animateParticles);
        }

        // JS MODULE 2: BOOT LOADER
        const loader = document.getElementById('loader');
        const progressBar = document.getElementById('progress');
        const loaderLog = document.getElementById('loader-log');
        const logs = ["Loading Core...", "Connecting Gemini...", "Decrypting...", "Starting Engine...", "READY"];
        let loadIdx = 0;
        function runLoader() {
            if (loadIdx < logs.length) {
                loaderLog.innerText = logs[loadIdx];
                progressBar.style.width = ((loadIdx + 1) / logs.length) * 100 + "%";
                loadIdx++; setTimeout(runLoader, 300);
            } else {
                setTimeout(() => { loader.style.opacity = "0"; setTimeout(() => { loader.style.display = "none"; }, 500); }, 500);
            }
        }

        // JS MODULE 3: STATS
        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }
        function updateStats() {
            document.getElementById('cpu-val').innerText = Math.floor(Math.random() * 30 + 10);
            document.getElementById('mem-val').innerText = Math.floor(Math.random() * 20 + 30);
        }
        function genLog() {
            const c = document.getElementById('console');
            const msgs = ["Ping: 24ms", "Gemini 2.5 OK", "Scanning...", "Updating..."];
            const p = document.createElement('div'); p.innerText = `> ${msgs[Math.floor(Math.random()*msgs.length)]}`;
            c.prepend(p); if(c.children.length > 20) c.removeChild(c.lastChild);
        }
        function animAudio() { document.querySelectorAll('.bar').forEach(b => b.style.height = Math.random()*100 + "%"); }

        // JS MODULE 4: CARD TILT
        document.querySelectorAll('.portal-card').forEach(card => {
            card.addEventListener('mousemove', e => {
                const r = card.getBoundingClientRect();
                card.style.transform = `perspective(2000px) rotateX(${(r.height/2 - (e.clientY-r.top))/10}deg) rotateY(${((e.clientX-r.left)-r.width/2)/10}deg) scale(1.05) translateZ(50px)`;
            });
            card.addEventListener('mouseleave', () => card.style.transform = `perspective(2000px) rotateX(0) rotateY(0) scale(1) translateZ(0)`);
        });

        // JS MODULE 5: GLITCH TEXT
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        document.querySelector('.glitch-text').onmouseover = e => {
            let iter = 0; const orig = e.target.dataset.text; clearInterval(e.target.interval);
            e.target.interval = setInterval(() => {
                e.target.innerText = orig.split("").map((l, i) => i < iter ? orig[i] : letters[Math.floor(Math.random()*26)]).join("");
                if(iter >= orig.length) clearInterval(e.target.interval); iter += 1/3;
            }, 30);
        };

        // JS MODULE 6: TYPEWRITER (放在 Gemini Bar 裡)
        const textToType = "想知道現在組電腦要花多少錢嗎？讓我們一探究竟。";
        let typeIdx = 0;
        function typeWriter() {
            const target = document.getElementById("typewriter-text");
            if (typeIdx < textToType.length) {
                target.innerText += textToType.charAt(typeIdx);
                typeIdx++; setTimeout(typeWriter, 150);
            }
        }

        window.onload = function() {
            initParticles(); animateParticles(); runLoader();
            setInterval(updateClock, 1000); setInterval(updateStats, 2000); setInterval(genLog, 800); setInterval(animAudio, 200);
            setTimeout(typeWriter, 3500); // 開機動畫後開始打字
        };
    </script>
</body>
</html>
